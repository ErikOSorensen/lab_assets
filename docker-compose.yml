services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: lab_assets
      POSTGRES_USER: lab_assets
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lab_assets_dev}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lab_assets"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8000}:8000"
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgres"
      POSTGRES_DB: lab_assets
      POSTGRES_USER: lab_assets
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lab_assets_dev}
      POSTGRES_HOST: db
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-in-production}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-}
      DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME:-admin}
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL:-admin@localhost}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD:-admin}

volumes:
  postgres_data:
  media_data:
